<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Quản trị viên - BizFlow Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div id="admin-header"></div>

<div class="container my-5 flex-grow-1">
    <h1 class="mb-4">Quản lý quản trị viên</h1>

    <div id="message-box" class="alert d-none"></div>

    <!-- Nút thêm Admin -->
    <div class="mb-3">
        <button id="add-admin-btn" class="btn btn-primary" onclick="openAddForm()">Thêm quản trị viên</button>
    </div>

    <!-- FORM THÊM/SỬA -->
    <div id="admin-form-container" class="card mb-4 shadow-sm" style="display: none;">
        <div class="card-body">
            <h2 id="form-title">Thêm quản trị viên mới</h2>
            <form id="admin-form" onsubmit="handleSaveAdmin(event)">
                <input type="hidden" id="admin-id">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Tên đăng nhập</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Mật khẩu <small class="text-muted" id="password-hint"></small></label>
                        <input type="password" id="password" class="form-control">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Họ và tên</label>
                        <input type="text" id="full_name" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Vai trò</label>
                        <select id="role" class="form-select" required>
                            <option value="manager">Quản lý (Manager)</option>
                            <option value="superadmin">Superadmin</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-success">Lưu</button>
                <button type="button" class="btn btn-secondary" onclick="closeForm()">Hủy</button>
            </form>
        </div>
    </div>

    <!-- BẢNG DANH SÁCH -->
    <div class="table-responsive bg-white shadow-sm">
        <table class="table table-bordered table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên đăng nhập</th>
                    <th>Họ và tên</th>
                    <th>Vai trò</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="admins-table-body">
                <tr><td colspan="5" class="text-center">Đang tải dữ liệu...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="admin-footer"></div>

<script>
    const API_URL = 'http://127.0.0.1:8000/admins/';
    let currentAdmins = [];

    // LẤY THÔNG TIN ĐĂNG NHẬP TỪ LOCALSTORAGE
    const currentAdminId = parseInt(localStorage.getItem('admin_id')) || 0; 
    const currentAdminRole = localStorage.getItem('admin_role') || 'manager'; 

    // Kiểm tra quyền truy cập: Chỉ cho superadmin vào
    function checkAccess() {
        if (currentAdminRole !== 'superadmin') {
            alert('Bạn không có quyền truy cập trang quản lý Quản trị viên!');
            window.location.href = 'admin-products.html'; 
        }
    }

    function showMessage(msg, isError = false) {
        const box = document.getElementById('message-box');
        box.className = `alert ${isError ? 'alert-danger' : 'alert-success'} mb-4`;
        box.textContent = msg;
        box.classList.remove('d-none');
        setTimeout(() => box.classList.add('d-none'), 3000);
    }

    // --- XỬ LÝ GIAO DIỆN FORM ---
    function openAddForm() {
        document.getElementById('admin-form-container').style.display = 'block';
        document.getElementById('form-title').innerText = 'Thêm quản trị viên mới';
        document.getElementById('admin-form').reset();
        document.getElementById('admin-id').value = '';
        document.getElementById('password').required = true;
        document.getElementById('password-hint').innerText = '(Bắt buộc)';
        document.getElementById('username').disabled = false;
    }

    function openEditForm(id) {
        const admin = currentAdmins.find(a => a.id === id);
        if (!admin) return;

        document.getElementById('admin-form-container').style.display = 'block';
        document.getElementById('form-title').innerText = `Chỉnh sửa quản trị viên #${id}`;
        
        document.getElementById('admin-id').value = admin.id;
        document.getElementById('username').value = admin.username;
        document.getElementById('username').disabled = true;
        document.getElementById('full_name').value = admin.full_name;
        document.getElementById('role').value = admin.role;
        
        document.getElementById('password').required = false;
        document.getElementById('password-hint').innerText = '(Để trống nếu không đổi)';
        window.scrollTo(0, 0);
    }

    function closeForm() {
        document.getElementById('admin-form-container').style.display = 'none';
        document.getElementById('admin-form').reset();
    }

    // --- GỌI API ---
    async function fetchAdmins() {
        try {
            const response = await fetch(API_URL);
            currentAdmins = await response.json();
            
            const tbody = document.getElementById('admins-table-body');
            tbody.innerHTML = '';

            currentAdmins.forEach(admin => {
                const roleBadge = admin.role === 'superadmin' 
                    ? '<span class="badge bg-danger">Superadmin</span>' 
                    : '<span class="badge bg-primary">Quản lý</span>';

                // Không hiển thị nút Xóa nếu ID trùng với ID người đang đăng nhập
                const deleteBtn = admin.id !== currentAdminId 
                    ? `<button class="btn btn-danger btn-sm" onclick="deleteAdmin(${admin.id})">Xóa</button>` 
                    : `<span class="text-muted small">Đang đăng nhập</span>`;

                tbody.innerHTML += `
                    <tr>
                        <td>${admin.id}</td>
                        <td>${admin.username}</td>
                        <td>${admin.full_name}</td>
                        <td>${roleBadge}</td>
                        <td>
                            <button class="btn btn-warning btn-sm me-1" onclick="openEditForm(${admin.id})">Sửa</button>
                            ${deleteBtn}
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            document.getElementById('admins-table-body').innerHTML = '<tr><td colspan="5" class="text-danger text-center">Lỗi tải dữ liệu. Bạn đã tạo API FastAPI /admins/ chưa?</td></tr>';
        }
    }

    async function handleSaveAdmin(event) {
        event.preventDefault();
        const id = document.getElementById('admin-id').value;
        const method = id ? 'PUT' : 'POST'; 
        const url = id ? `${API_URL}${id}` : API_URL;

        const payload = {
            username: document.getElementById('username').value,
            full_name: document.getElementById('full_name').value,
            role: document.getElementById('role').value
        };

        const passwordInput = document.getElementById('password').value;
        if (passwordInput) {
            payload.password = passwordInput;
        }

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                showMessage(id ? "Đã cập nhật thành công!" : "Đã thêm quản trị viên thành công!");
                closeForm();
                fetchAdmins();
            } else {
                const errData = await response.json();
                showMessage(errData.detail || "Lỗi từ Server (Có thể trùng Tên đăng nhập)!", true);
            }
        } catch (error) {
            showMessage("Lỗi kết nối API!", true);
        }
    }

    async function deleteAdmin(id) {
        if (id === currentAdminId) {
            showMessage("Bạn không thể tự xóa chính mình!", true);
            return;
        }

        if (!confirm('Bạn chắc chắn muốn xóa quản trị viên này?')) return;

        try {
            const response = await fetch(`${API_URL}${id}`, { method: 'DELETE' });
            if (response.ok) {
                showMessage("Đã xóa quản trị viên thành công!");
                fetchAdmins();
            } else {
                showMessage("Không thể xóa quản trị viên này.", true);
            }
        } catch (error) {
            showMessage("Lỗi kết nối API!", true);
        }
    }

    window.onload = () => {
        checkAccess(); 
        fetchAdmins(); 
    };
</script>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
