<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý người dùng - BizFlow Admin</title>
    <!-- Nhúng Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div id="admin-header"></div>

<div class="container my-5 flex-grow-1">
    <h1 class="mb-4">Quản lý người dùng</h1>

    <!-- Thông báo -->
    <div id="message-box" class="alert d-none"></div>

    <!-- Nút mở Form -->
    <div class="mb-3">
        <button id="add-user-btn" class="btn btn-primary" onclick="openAddForm()">Thêm người dùng mới</button>
    </div>

    <!-- FORM THÊM / SỬA NGƯỜI DÙNG -->
    <div id="user-form-container" class="card mb-4 shadow-sm" style="display: none;">
        <div class="card-body">
            <h2 id="form-title">Thêm người dùng</h2>
            <form id="user-form" onsubmit="handleSaveUser(event)">
                <!-- Input ẩn lưu ID (Dùng khi cập nhật) -->
                <input type="hidden" id="user-id">

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Tên đăng nhập</label>
                        <input type="text" id="username" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Mật khẩu <small class="text-muted" id="password-hint"></small></label>
                        <input type="password" id="password" class="form-control">
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Email</label>
                        <input type="email" id="email" class="form-control" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Họ và tên</label>
                        <input type="text" id="full_name" class="form-control" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label>Số điện thoại</label>
                        <input type="text" id="phone" class="form-control">
                    </div>
                    <div class="col-md-6 mb-3">
                        <label>Địa chỉ</label>
                        <input type="text" id="address" class="form-control">
                    </div>
                </div>

                <button type="submit" class="btn btn-success" id="btn-save">Lưu</button>
                <button type="button" class="btn btn-secondary" onclick="closeForm()">Hủy</button>
            </form>
        </div>
    </div>

    <!-- BẢNG DANH SÁCH -->
    <div class="table-responsive bg-white shadow-sm">
        <table class="table table-bordered table-hover mb-0">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Tên đăng nhập</th>
                    <th>Email</th>
                    <th>Họ và tên</th>
                    <th>Trạng thái</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="users-table-body">
                <tr><td colspan="6" class="text-center">Đang tải dữ liệu...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div id="admin-footer"></div>

<script>
    const API_URL = 'http://127.0.0.1:8000/users/';

    let currentUsers = []; 

    // --- HÀM TIỆN ÍCH ---
    function showMessage(msg, isError = false) {
        const box = document.getElementById('message-box');
        box.className = `alert ${isError ? 'alert-danger' : 'alert-success'} mb-4`;
        box.textContent = msg;
        box.classList.remove('d-none');
        setTimeout(() => box.classList.add('d-none'), 3000);
    }

    // --- QUẢN LÝ GIAO DIỆN FORM ---
    function openAddForm() {
        document.getElementById('user-form-container').style.display = 'block';
        document.getElementById('form-title').innerText = 'Thêm người dùng mới';
        document.getElementById('user-form').reset();
        document.getElementById('user-id').value = '';
        document.getElementById('password').required = true;
        document.getElementById('password-hint').innerText = '(Bắt buộc)';
        document.getElementById('username').disabled = false; 
    }

    function openEditForm(id) {
        const user = currentUsers.find(u => u.id === id);
        if (!user) return;

        document.getElementById('user-form-container').style.display = 'block';
        document.getElementById('form-title').innerText = `Chỉnh sửa người dùng #${id}`;
        
        document.getElementById('user-id').value = user.id;
        document.getElementById('username').value = user.username;
        document.getElementById('username').disabled = true; 
        document.getElementById('email').value = user.email;
        document.getElementById('full_name').value = user.full_name;
        document.getElementById('phone').value = user.phone || '';
        document.getElementById('address').value = user.address || '';
        
        document.getElementById('password').required = false;
        document.getElementById('password-hint').innerText = '(Để trống nếu không đổi)';
        window.scrollTo(0, 0); 
    }

    function closeForm() {
        document.getElementById('user-form-container').style.display = 'none';
        document.getElementById('user-form').reset();
    }

    // --- CÁC HÀM GỌI API ---

    async function fetchUsers() {
        try {
            const response = await fetch(API_URL);
            if (!response.ok) throw new Error('Network response was not ok');
            currentUsers = await response.json();
            
            const tbody = document.getElementById('users-table-body');
            tbody.innerHTML = '';

            currentUsers.forEach(user => {
                const statusBadge = user.is_active 
                    ? '<span class="badge bg-success">Kích hoạt</span>' 
                    : '<span class="badge bg-secondary">Vô hiệu hóa</span>';
                
                const toggleBtnText = user.is_active ? 'Vô hiệu hóa' : 'Kích hoạt';
                const toggleBtnClass = user.is_active ? 'btn-warning' : 'btn-success';

                tbody.innerHTML += `
                    <tr>
                        <td>${user.id}</td>
                        <td>${user.username}</td>
                        <td>${user.email}</td>
                        <td>${user.full_name}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn btn-primary btn-sm me-1" onclick="openEditForm(${user.id})">Sửa</button>
                            <button class="btn btn-danger btn-sm me-1" onclick="deleteUser(${user.id})">Xóa</button>
                            <button class="btn ${toggleBtnClass} btn-sm" onclick="toggleActive(${user.id})">${toggleBtnText}</button>
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error(error);
            document.getElementById('users-table-body').innerHTML = '<tr><td colspan="6" class="text-danger text-center">Lỗi tải dữ liệu. API chưa chạy?</td></tr>';
        }
    }

    async function handleSaveUser(event) {
        event.preventDefault();

        const id = document.getElementById('user-id').value;
        const method = id ? 'PUT' : 'POST'; 
        const url = id ? `${API_URL}${id}` : API_URL;

        const payload = {
            username: document.getElementById('username').value,
            email: document.getElementById('email').value,
            full_name: document.getElementById('full_name').value,
            phone: document.getElementById('phone').value,
            address: document.getElementById('address').value
        };

        const passwordInput = document.getElementById('password').value;
        if (passwordInput) {
            payload.password = passwordInput;
        }

        try {
            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                showMessage(id ? "Đã cập nhật thành công!" : "Đã thêm người dùng thành công!");
                closeForm();
                fetchUsers();
            } else {
                const errData = await response.json();
                showMessage(errData.detail || "Có lỗi xảy ra từ Server!", true);
            }
        } catch (error) {
            showMessage("Lỗi kết nối API!", true);
        }
    }

    async function deleteUser(id) {
        if (!confirm('Bạn chắc chắn muốn xóa người dùng này? Thao tác này không thể hoàn tác!')) return;

        try {
            const response = await fetch(`${API_URL}${id}`, { method: 'DELETE' });
            if (response.ok) {
                showMessage("Đã xóa người dùng thành công!");
                fetchUsers();
            } else {
                showMessage("Không thể xóa. Có thể người dùng này đã có đơn hàng.", true);
            }
        } catch (error) {
            showMessage("Lỗi kết nối API!", true);
        }
    }

    async function toggleActive(id) {
        try {
            const response = await fetch(`${API_URL}${id}/toggle-active`, { method: 'PATCH' });
            
            if (response.ok) {
                showMessage("Đã cập nhật trạng thái hoạt động!");
                fetchUsers();
            } else {
                showMessage("Lỗi khi cập nhật trạng thái!", true);
            }
        } catch (error) {
            showMessage("Lỗi kết nối API!", true);
        }
    }

    window.onload = fetchUsers;
</script>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
