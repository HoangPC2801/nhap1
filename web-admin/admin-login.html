<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Quản trị - BizFlow Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center min-vh-100">

<div class="container" style="max-width: 450px;">
    <div class="card shadow border-0">
        <div class="card-body p-4 p-md-5">
            <div class="text-center mb-4">
                <h2 class="fw-bold text-primary">BizFlow Admin</h2>
                <p class="text-muted">Đăng nhập hệ thống quản trị</p>
            </div>

            <div id="error-box" class="alert alert-danger d-none"></div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Tên đăng nhập</label>
                    <input type="text" class="form-control form-control-lg" id="username" required placeholder="Nhập admin...">
                </div>
                
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Mật khẩu</label>
                    <input type="password" class="form-control form-control-lg" id="password" required placeholder="Nhập mật khẩu...">
                </div>
                
                <button type="submit" class="btn btn-primary btn-lg w-100 fw-bold" id="btn-login">
                    Đăng nhập
                </button>
            </form>
        </div>
    </div>
</div>

<script>
    const LOGIN_API_URL = 'http://127.0.0.1:8000/admins/login';

    // 1. Kiểm tra nếu đã đăng nhập rồi thì đẩy thẳng vào Dashboard, không bắt đăng nhập lại
    window.onload = () => {
        if (localStorage.getItem('admin_role')) {
            window.location.href = 'admin-dashboard.html';
        }
    };

    function showError(msg) {
        const box = document.getElementById('error-box');
        box.textContent = msg;
        box.classList.remove('d-none');
    }

    // 2. Xử lý sự kiện đăng nhập
    async function handleLogin(event) {
        event.preventDefault(); // Chặn hành vi tải lại trang của Form

        const usernameInput = document.getElementById('username').value;
        const passwordInput = document.getElementById('password').value;
        const btnLogin = document.getElementById('btn-login');

        // Hiển thị trạng thái đang xử lý
        btnLogin.disabled = true;
        btnLogin.innerText = 'Đang kiểm tra...';
        document.getElementById('error-box').classList.add('d-none');

        try {
            // Gửi dữ liệu lên API
            const response = await fetch(LOGIN_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    username: usernameInput,
                    password: passwordInput
                })
            });

            const data = await response.json();

            if (response.ok) {
                // Đăng nhập thành công: Lưu thông tin vào LocalStorage
                localStorage.setItem('admin_id', data.id);
                localStorage.setItem('admin_role', data.role);
                localStorage.setItem('admin_username', data.username);
                
                // Nếu Backend của bạn có cấu hình JWT Token để bảo mật API, hãy lưu thêm token:
                if (data.access_token) {
                    localStorage.setItem('admin_token', data.access_token);
                }

                // Chuyển hướng vào trang quản trị
                window.location.href = 'admin-dashboard.html';
            } else {
                // Đăng nhập thất bại (Sai pass, sai user...)
                showError(data.detail || "Tên đăng nhập hoặc mật khẩu không đúng.");
                btnLogin.disabled = false;
                btnLogin.innerText = 'Đăng nhập';
            }
        } catch (error) {
            showError("Không thể kết nối đến máy chủ Backend. Vui lòng kiểm tra lại FastAPI.");
            btnLogin.disabled = false;
            btnLogin.innerText = 'Đăng nhập';
        }
    }
</script>

</body>
</html>
