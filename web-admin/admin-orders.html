<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý đơn hàng - BizFlow Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<div id="admin-header"></div>

<div class="container my-5 flex-grow-1">
    <h1 class="mb-4">Quản lý đơn hàng</h1>

    <!-- Khung hiển thị thông báo -->
    <div id="message-box" class="alert d-none"></div>

    <!-- MÀN HÌNH 1: DANH SÁCH ĐƠN HÀNG             -->
    <div id="orders-list-view">
        <div class="card mb-4 shadow-sm">
            <div class="card-body">
                <form id="filter-form" class="row g-2 align-items-center">
                    <div class="col-md-4">
                        <select id="status-filter" class="form-select">
                            <option value="">Tất cả trạng thái</option>
                            <option value="pending">Chờ xử lý</option>
                            <option value="processing">Đang xử lý</option>
                            <option value="shipped">Đang giao</option>
                            <option value="completed">Hoàn thành</option>
                            <option value="cancelled">Đã hủy</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Lọc</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="table-responsive bg-white shadow-sm">
            <table class="table table-bordered table-hover mb-0">
                <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Ngày đặt</th>
                        <th>Khách hàng</th>
                        <th>Tổng tiền</th>
                        <th>Trạng thái</th>
                        <th>Hành động</th>
                    </tr>
                </thead>
                <tbody id="order-table-body">
                    <tr><td colspan="6" class="text-center">Đang tải dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- MÀN HÌNH 2: CHI TIẾT ĐƠN HÀNG (Ẩn mặc định)-->
    <div id="order-detail-view" class="d-none">
        <button class="btn btn-secondary mb-3" onclick="showListView()">&larr; Quay lại danh sách</button>
        
        <h2 id="detail-title" class="mb-4">Chi tiết đơn hàng</h2>

        <div class="row">
            <!-- Thông tin đơn hàng & Khách hàng -->
            <div class="col-md-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-primary text-white"><strong>Thông tin đơn hàng</strong></div>
                    <div class="card-body" id="detail-order-info">
                        <!-- JS đổ dữ liệu vào đây -->
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-warning text-dark"><strong>Cập nhật trạng thái</strong></div>
                    <div class="card-body">
                        <div class="form-group mb-3">
                            <label>Trạng thái hiện tại</label>
                            <select id="detail-status-select" class="form-select">
                                <option value="pending">Chờ xử lý</option>
                                <option value="processing">Đang xử lý</option>
                                <option value="shipped">Đang giao</option>
                                <option value="completed">Hoàn thành</option>
                                <option value="cancelled">Đã hủy</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="updateOrderStatus()">Lưu cập nhật</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chi tiết sản phẩm trong đơn -->
        <div class="card shadow-sm">
            <div class="card-header bg-info text-white"><strong>Chi tiết sản phẩm</strong></div>
            <div class="card-body p-0">
                <table class="table table-bordered mb-0">
                    <thead class="table-light">
                        <tr>
                            <th>Sản phẩm ID</th>
                            <th>Giá</th>
                            <th>Số lượng</th>
                            <th>Tổng</th>
                        </tr>
                    </thead>
                    <tbody id="detail-items-body">
                        <!-- JS đổ dữ liệu vào đây -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<div id="admin-footer"></div>

<script>
    const API_URL = 'http://127.0.0.1:8000/orders/';
    let currentOrders = [];   
    let currentDetailId = null; 

    function showMessage(msg, isError = false) {
        const box = document.getElementById('message-box');
        box.className = `alert ${isError ? 'alert-danger' : 'alert-success'} mb-4`;
        box.textContent = msg;
        box.classList.remove('d-none');
        setTimeout(() => box.classList.add('d-none'), 3000);
    }

    function formatDate(dateString) {
        if (!dateString) return 'N/A';
        const d = new Date(dateString);
        return d.toLocaleDateString('vi-VN') + ' ' + d.toLocaleTimeString('vi-VN');
    }

    function getStatusBadge(status) {
        const map = {
            'pending': '<span class="badge bg-secondary">Chờ xử lý</span>',
            'processing': '<span class="badge bg-info">Đang xử lý</span>',
            'shipped': '<span class="badge bg-primary">Đang giao</span>',
            'completed': '<span class="badge bg-success">Hoàn thành</span>',
            'cancelled': '<span class="badge bg-danger">Đã hủy</span>'
        };
        return map[status] || `<span class="badge bg-dark">${status}</span>`;
    }

    function showListView() {
        document.getElementById('orders-list-view').classList.remove('d-none');
        document.getElementById('order-detail-view').classList.add('d-none');
        fetchOrders(); 
    }

    function showDetailView(orderId) {
        document.getElementById('orders-list-view').classList.add('d-none');
        document.getElementById('order-detail-view').classList.remove('d-none');
        loadOrderDetails(orderId);
    }

    async function fetchOrders(statusFilter = '') {
        try {
            const response = await fetch(API_URL);
            let orders = await response.json();
            currentOrders = orders; 

            if (statusFilter !== '') {
                orders = orders.filter(o => o.status === statusFilter);
            }

            const tbody = document.getElementById('order-table-body');
            tbody.innerHTML = '';

            if (orders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center">Không có đơn hàng nào.</td></tr>';
                return;
            }

            orders.forEach(order => {
                const cancelBtn = order.status === 'pending' 
                    ? `<button class="btn btn-danger btn-sm" onclick="cancelOrder(${order.id})">Hủy</button>` 
                    : '';

                tbody.innerHTML += `
                    <tr>
                        <td>#${order.id}</td>
                        <td>${formatDate(order.created_at)}</td>
                        <td>${order.username || 'User ID: ' + order.user_id}</td>
                        <td class="text-danger fw-bold">${order.total.toLocaleString()} VNĐ</td>
                        <td>${getStatusBadge(order.status)}</td>
                        <td>
                            <button class="btn btn-primary btn-sm me-1" onclick="showDetailView(${order.id})">Xem</button>
                            ${cancelBtn}
                        </td>
                    </tr>
                `;
            });
        } catch (error) {
            document.getElementById('order-table-body').innerHTML = '<tr><td colspan="6" class="text-danger text-center">Lỗi kết nối đến Backend FastAPI.</td></tr>';
        }
    }

    function loadOrderDetails(orderId) {
        currentDetailId = orderId;
        const order = currentOrders.find(o => o.id === orderId);
        
        if (!order) {
            showMessage("Không tìm thấy dữ liệu đơn hàng!", true);
            return;
        }

        document.getElementById('detail-title').innerText = `Chi tiết đơn hàng #${order.id}`;
        
        document.getElementById('detail-order-info').innerHTML = `
            <p><strong>Ngày đặt:</strong> ${formatDate(order.created_at)}</p>
            <p><strong>Tổng tiền:</strong> <span class="text-danger fw-bold">${order.total.toLocaleString()} VNĐ</span></p>
            <p><strong>Phương thức:</strong> ${order.payment_method}</p>
            <p><strong>Địa chỉ giao:</strong> ${order.shipping_address}</p>
            <hr>
            <p><strong>Khách hàng:</strong> ${order.username || 'User ID: ' + order.user_id}</p>
        `;

        document.getElementById('detail-status-select').value = order.status;

        const itemsBody = document.getElementById('detail-items-body');
        itemsBody.innerHTML = '';
        
        if (order.items && order.items.length > 0) {
            order.items.forEach(item => {
                itemsBody.innerHTML += `
                    <tr>
                        <td>Sản phẩm #${item.product_id}</td>
                        <td>${item.price.toLocaleString()} VNĐ</td>
                        <td>${item.quantity}</td>
                        <td>${(item.price * item.quantity).toLocaleString()} VNĐ</td>
                    </tr>
                `;
            });
        } else {
            itemsBody.innerHTML = '<tr><td colspan="4" class="text-center">Backend chưa trả về dữ liệu Chi tiết món hàng (order_items).</td></tr>';
        }
    }

    async function updateOrderStatus() {
        const newStatus = document.getElementById('detail-status-select').value;
        try {
            const response = await fetch(`${API_URL}${currentDetailId}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: newStatus })
            });

            if (response.ok) {
                showMessage(`Đã cập nhật đơn hàng #${currentDetailId} thành công!`);
                const order = currentOrders.find(o => o.id === currentDetailId);
                if (order) order.status = newStatus;
            } else {
                showMessage("Lỗi khi cập nhật trạng thái!", true);
            }
        } catch (error) {
            showMessage("Lỗi kết nối API!", true);
        }
    }

    async function cancelOrder(orderId) {
        if (!confirm('Bạn chắc chắn muốn hủy đơn hàng này?')) return;
        
        try {
            const response = await fetch(`${API_URL}${orderId}/status`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ status: 'cancelled' })
            });

            if (response.ok) {
                showMessage("Đã hủy đơn hàng thành công!");
                fetchOrders();
            } else {
                showMessage("Lỗi khi hủy đơn hàng!", true);
            }
        } catch (error) {
            showMessage("Lỗi kết nối API!", true);
        }
    }

    document.getElementById('filter-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const status = document.getElementById('status-filter').value;
        fetchOrders(status);
    });

    window.onload = fetchOrders;

</script>

<script src="layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
